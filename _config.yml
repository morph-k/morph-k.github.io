title: morpheus
author: Morphy Kuffour
email: morpkuff@pm.me
description: >-
  nixos, security, qmk, vim, neovim, scripting, keyboards,
# baseurl: "" # the subpath of your site, e.g. /blog
domain: morph-k.github.io
url: https://morph-k.github.io
github_username: morph-k

remote_theme: riggraz/no-style-please

theme_config:
  appearance: "auto" # can be "light", "dark" or "auto"
  back_home_text: ".." # customize text for homepage link
  date_format: "%Y-%m-%d"
  show_description: true # show blog description in homepage
  show_lastmod: false
  show_categories: true
  lowercase_titles: false

sass:
  style: compressed

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
